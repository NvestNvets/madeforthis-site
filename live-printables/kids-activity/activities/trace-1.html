<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trace &amp; Learn | Numbers 1 to 5</title>
  <link rel="stylesheet" href="/live-printables/kids-activity/printables.css" />
</head>
<body class="activity-body" data-watermark-text="Made For This" data-watermark-delay="3000">
  <div class="corner-watermark" aria-hidden="true"><span class="watermark-butterfly">+</span><span>Made For This</span></div>
  <main class="activity-shell">
    <section class="activity-toolbar">
      <a class="breadcrumb-link" href="/live-printables/kids-activity/index.html">Back to Printable Hub</a>
      <div class="button-row">
        <button class="btn btn-primary" type="button" data-print-button>Print This Page</button>
        <a class="btn" href="/downloads/kids-activity/trace-1.pdf" data-download-label="Trace Numbers PDF">Download PDF</a>
      </div>
    </section>
    <article class="worksheet-sheet">
      <header class="sheet-header">
        <div>
          <p class="eyebrow">Trace &amp; Learn</p>
          <h1>Numbers 1 to 5</h1>
          <p>Trace each number and match it to the correct number of dots.</p>
        </div>
        <div class="print-badge"><img class="qr-image" data-qr-target="https://aik9kennel.online" alt="QR code to AI K9 Codee" /></div>
      </header>
      <section class="sheet-body">
        <div class="number-rows">
          <div class="number-row"><span class="dot-number">1</span><span class="trace-dots">1 1 1</span><span class="dot-cluster one"></span></div>
          <div class="number-row"><span class="dot-number">2</span><span class="trace-dots">2 2 2</span><span class="dot-cluster two"></span></div>
          <div class="number-row"><span class="dot-number">3</span><span class="trace-dots">3 3 3</span><span class="dot-cluster three"></span></div>
          <div class="number-row"><span class="dot-number">4</span><span class="trace-dots">4 4 4</span><span class="dot-cluster four"></span></div>
          <div class="number-row"><span class="dot-number">5</span><span class="trace-dots">5 5 5</span><span class="dot-cluster five"></span></div>
        </div>
      </section>
      <footer class="sheet-footer"><span>Made For This</span><a class="text-link" href="/live-printables/kids-activity/bundle.html">Back to Bundle</a></footer>
    </article>
  </main>
  <script src="/js/qr.js"></script>
  <script src="/js/print.js"></script>
  <script src="/js/watermark.js"></script>
</body>
</html>
