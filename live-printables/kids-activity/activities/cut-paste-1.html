<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cut &amp; Paste | Build a House</title>
  <link rel="stylesheet" href="/live-printables/kids-activity/printables.css" />
</head>
<body class="activity-body" data-watermark-text="Made For This" data-watermark-delay="3000">
  <div class="corner-watermark" aria-hidden="true"><span class="watermark-butterfly">+</span><span>Made For This</span></div>
  <main class="activity-shell">
    <section class="activity-toolbar">
      <a class="breadcrumb-link" href="/live-printables/kids-activity/index.html">Back to Printable Hub</a>
      <div class="button-row">
        <button class="btn btn-primary" type="button" data-print-button>Print This Page</button>
        <a class="btn" href="/downloads/kids-activity/cut-paste-1.pdf" data-download-label="Cut and Paste PDF">Download PDF</a>
      </div>
    </section>
    <article class="worksheet-sheet">
      <header class="sheet-header">
        <div>
          <p class="eyebrow">Cut &amp; Paste</p>
          <h1>Build a House</h1>
          <p>Cut the shapes below and place them in the house outline.</p>
        </div>
        <div class="print-badge"><img class="qr-image" data-qr-target="https://aik9kennel.online" alt="QR code to AI K9 Codee" /></div>
      </header>
      <section class="sheet-body">
        <div class="cut-layout">
          <div class="build-stage">
            <svg viewBox="0 0 320 280" aria-hidden="true">
              <g fill="none" stroke="#111" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="160,26 282,110 38,110"></polygon>
                <rect x="68" y="110" width="184" height="138" rx="16"></rect>
                <rect x="134" y="156" width="52" height="92" rx="10"></rect>
                <rect x="90" y="136" width="30" height="30" rx="6"></rect>
                <rect x="200" y="136" width="30" height="30" rx="6"></rect>
              </g>
            </svg>
          </div>
          <div class="piece-grid">
            <div class="piece-card">roof</div>
            <div class="piece-card">wall</div>
            <div class="piece-card">door</div>
            <div class="piece-card">window</div>
          </div>
        </div>
      </section>
      <footer class="sheet-footer"><span>Made For This</span><a class="text-link" href="/live-printables/kids-activity/bundle.html">See Bundle</a></footer>
    </article>
  </main>
  <script src="/js/qr.js"></script>
  <script src="/js/print.js"></script>
  <script src="/js/watermark.js"></script>
</body>
</html>
