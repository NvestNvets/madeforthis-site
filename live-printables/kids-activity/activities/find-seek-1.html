<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Find &amp; Seek | Find 6 Objects</title>
  <link rel="stylesheet" href="/live-printables/kids-activity/printables.css" />
</head>
<body class="activity-body" data-watermark-text="Made For This" data-watermark-delay="3000">
  <div class="corner-watermark" aria-hidden="true"><span class="watermark-butterfly">+</span><span>Made For This</span></div>
  <main class="activity-shell">
    <section class="activity-toolbar">
      <a class="breadcrumb-link" href="/live-printables/kids-activity/index.html">Back to Printable Hub</a>
      <div class="button-row">
        <button class="btn btn-primary" type="button" data-print-button>Print This Page</button>
        <a class="btn" href="/downloads/kids-activity/find-seek-1.pdf" data-download-label="Find and Seek PDF">Download PDF</a>
      </div>
    </section>
    <article class="worksheet-sheet">
      <header class="sheet-header">
        <div>
          <p class="eyebrow">Find &amp; Seek</p>
          <h1>Find 6 Objects</h1>
          <p>Circle the star, heart, leaf, cloud, cup, and ball.</p>
        </div>
        <div class="print-badge"><img class="qr-image" data-qr-target="https://aik9kennel.online" alt="QR code to AI K9 Codee" /></div>
      </header>
      <section class="sheet-body">
        <div class="seek-grid">
          <div class="seek-cell">star</div>
          <div class="seek-cell">heart</div>
          <div class="seek-cell">leaf</div>
          <div class="seek-cell">book</div>
          <div class="seek-cell">cloud</div>
          <div class="seek-cell">ball</div>
          <div class="seek-cell">cup</div>
          <div class="seek-cell">toy</div>
        </div>
        <div class="target-row">
          <span>star</span><span>heart</span><span>leaf</span><span>cloud</span><span>cup</span><span>ball</span>
        </div>
      </section>
      <footer class="sheet-footer"><span>Made For This</span><a class="text-link" href="/live-printables/kids-activity/bundle.html">See Bundle</a></footer>
    </article>
  </main>
  <script src="/js/qr.js"></script>
  <script src="/js/print.js"></script>
  <script src="/js/watermark.js"></script>
</body>
</html>
