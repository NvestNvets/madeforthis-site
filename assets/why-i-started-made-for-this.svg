<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Why I Started Made for This</title>
  <desc id="desc">Soft neutral lifestyle blog graphic with workspace elements and headline text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8ecdf" />
      <stop offset="100%" stop-color="#f2ddd0" />
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f9f1e8" />
      <stop offset="100%" stop-color="#f5e5d8" />
    </linearGradient>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)" />
  <circle cx="190" cy="120" r="120" fill="#f6dfcf" opacity="0.85" />
  <circle cx="1220" cy="140" r="150" fill="#f3d8c8" opacity="0.8" />

  <rect x="120" y="360" width="1160" height="320" rx="22" fill="url(#desk)" stroke="#e8d5c7" />

  <!-- Laptop -->
  <rect x="780" y="280" width="390" height="245" rx="16" fill="#fff9f4" stroke="#e5d4c8" />
  <rect x="810" y="315" width="330" height="145" rx="10" fill="#f6e7dd" />
  <rect x="740" y="525" width="470" height="24" rx="12" fill="#e8d7ca" />

  <!-- Notebook -->
  <rect x="260" y="285" width="310" height="260" rx="14" fill="#fffaf6" stroke="#e5d5c8" />
  <line x1="300" y1="335" x2="530" y2="335" stroke="#e7d8cb" stroke-width="8" stroke-linecap="round" />
  <line x1="300" y1="380" x2="520" y2="380" stroke="#e9dccf" stroke-width="8" stroke-linecap="round" />
  <line x1="300" y1="425" x2="500" y2="425" stroke="#ecdfd5" stroke-width="8" stroke-linecap="round" />

  <!-- Coffee cup -->
  <circle cx="650" cy="455" r="72" fill="#fff9f5" stroke="#e3d0c1" />
  <circle cx="650" cy="455" r="45" fill="#dbc0ae" />
  <path d="M 712 440 Q 760 455 712 470" fill="none" stroke="#dfc8b8" stroke-width="10" stroke-linecap="round" />

  <!-- Sunlight strip -->
  <path d="M 0 0 L 410 0 L 250 780 L 0 780 Z" fill="#fff6ef" opacity="0.32" />

  <!-- Typography -->
  <text x="700" y="150" text-anchor="middle" fill="#9d604d" font-size="72" font-family="Brush Script MT, Snell Roundhand, cursive">
    Why I Started Made for This
  </text>
  <text x="700" y="205" text-anchor="middle" fill="#6e5a4f" font-size="34" font-family="Palatino Linotype, Georgia, serif">
    Building something meaningful one step at a time.
  </text>
</svg>
